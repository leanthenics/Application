packages:
  - 'apps/*'
  - 'packages/*'

# Flat node_modules (no .pnpm/<pkg>@<ver>_<hash>/ virtual-store wrapper). Required
# on Windows so the native Android build (react-native-worklets/reanimated CMake)
# stays under the 250-char object-path limit — the deep isolated paths blew past it
# (CMAKE_OBJECT_PATH_MAX → "ninja: build.ninja still dirty"). Also improves RN native
# module resolution. Trade-off: exposes phantom deps like npm/yarn — acceptable here.
nodeLinker: hoisted

# Force a single ioredis version so the instance type we create matches the one
# BullMQ expects (BullMQ pulled 5.10.1, apps/api asked for 5.11.1 -> type clash).
overrides:
  ioredis: '5.11.1'

# Approved build scripts (supply-chain gate). All are reputable deps we rely on:
# - esbuild: native binary used by tsx (dev server)
# - msgpackr-extract: native accelerator for BullMQ msgpackr
# - protobufjs / @google/genai: postinstall for our AI SDK deps
allowBuilds:
  '@google/genai': true
  esbuild: true
  msgpackr-extract: true
  protobufjs: true

minimumReleaseAgeExclude:
  - '@expo/cli@57.0.3'
  - '@expo/fingerprint@0.20.1'
  - '@expo/inline-modules@0.1.1'
  - '@expo/local-build-cache-provider@57.0.1'
  - '@expo/metro-config@57.0.2'
  - '@expo/metro-runtime@57.0.2'
  - '@expo/prebuild-config@57.0.3'
  - '@expo/router-server@57.0.1'
  - babel-preset-expo@57.0.1
  - expo-asset@57.0.2
  - expo-constants@57.0.2
  - expo-linking@57.0.1
  - expo-modules-autolinking@57.0.3
  - expo-modules-core@57.0.1
  - expo-router@57.0.2
  - expo-splash-screen@57.0.1
  - expo@57.0.1
